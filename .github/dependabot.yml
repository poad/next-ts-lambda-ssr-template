version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    allow:
      - dependency-type: all
    rebase-strategy: auto
    cooldown:
      default-days: 7
    assignees:
      - poad
    groups:
      actions:
        patterns:
          - '*'

  - package-ecosystem: npm
    directories:
      - '/'
      - '/app/'
      - '/cdk/'
    schedule:
      interval: daily
      timezone: Asia/Tokyo
    allow:
      - dependency-type: all
    rebase-strategy: auto
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: typescript
        versions: ~7.0.0
    assignees:
      - poad
    groups:
      npm:
        patterns:
          - '*'
